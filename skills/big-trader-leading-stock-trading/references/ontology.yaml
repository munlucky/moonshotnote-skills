version: "1.0"
domain: "Korean short-term stock trading study"
source_boundary: "third-party OCR source; public files contain only summaries and source refs"
node_types:
  Principle: "High-level trading stance or rule of interpretation."
  Concept: "Named market or learning concept from the source."
  Framework: "A grouped structure that organizes multiple strategies."
  Strategy: "A repeatable trading approach described at a summary level."
  RiskControl: "Risk, stop, sizing, or lifestyle constraint."
  MarketSignal: "Observable market behavior used as a decision input."
  PracticePlan: "Training roadmap or repeated learning routine."
  Mindset: "Psychological or behavioral stance."
edge_types:
  prioritizes: "Source concept says one concern comes before another."
  focuses_on: "A principle narrows attention to a specific concept."
  overlaps_with: "Two concepts share scope but differ in emphasis."
  signals: "One concept helps detect another."
  warns_with: "One concept supplies a caution signal."
  anchors: "A concept is the base for a framework."
  includes: "A framework contains a strategy."
  requires: "A method needs a control or prerequisite."
  filters_by: "A method narrows candidates using a concept."
  constrains: "A risk/control limits how a strategy should be used."
  extends: "One strategy is a continuation or variant of another."
  supports: "One concept helps apply another."
  specializes_into: "A broad strategy splits into a more specific variant."
  trained_by: "A concept is developed through a practice plan."
quality_notes:
  - "WinRT OCR was used as primary Korean prose source."

name: Validate Skills

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    name: Validate skills (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate skill manifest
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML
          python - <<'PY'
          import re
          import subprocess
          import sys
          from pathlib import Path

          import yaml

          skills = {
              "moonshotnote-ocr": [
                  "agents/openai.yaml",
                  "scripts/doctor.py",
                  "scripts/ocr_image.py",
                  "scripts/review_low_confidence.py",
                  "scripts/requirements.txt",
                  "scripts/setup.sh",
                  "scripts/setup.ps1",
              ],
              "fastapi-clean-architecture": [
                  "agents/openai.yaml",
                  "references/ontology.yaml",
                  "references/graph_manifest.json",
                  "references/nodes.jsonl",
                  "references/edges.jsonl",
                  "references/chunks.jsonl",
                  "references/coverage_matrix.jsonl",
                  "references/query_qa.jsonl",
                  "scripts/validate_graph.py",
                  "scripts/query_graph.py",
                  "scripts/expand_context.py",
                  "scripts/prepare_private_source.py",
              ],
              "text-knowledge-skill-builder": [
                  "agents/openai.yaml",
                  "references/workflow.md",
                  "references/knowledge-pack-schema.md",
                  "references/public-safety-checklist.md",
                  "scripts/chunk_source_text.py",
                  "scripts/lint_knowledge_pack.py",
                  "scripts/audit_public_safety.py",
              ],
              "tidy-first": [
                  "agents/openai.yaml",
                  "references/ontology.yaml",
                  "references/graph_manifest.json",
                  "references/nodes.jsonl",
                  "references/edges.jsonl",
                  "references/chunks.jsonl",
                  "references/coverage_matrix.jsonl",
                  "references/query_qa.jsonl",
                  "scripts/validate_graph.py",
                  "scripts/query_graph.py",
                  "scripts/expand_context.py",
              ],
              "backend-architecture": [
                  "agents/openai.yaml",
                  "references/ontology.yaml",
                  "references/graph_manifest.json",
                  "references/framework_adapters.yaml",
                  "references/nodes.jsonl",
                  "references/edges.jsonl",
                  "references/chunks.jsonl",
                  "references/canonical_registry.jsonl",
                  "references/promotion_records.jsonl",
                  "references/query_qa.jsonl",
                  "scripts/validate_graph.py",
                  "scripts/query_graph.py",
                  "scripts/expand_context.py",
              ],
              "modern-java-in-action": [
                  "agents/openai.yaml",
                  "references/ontology.yaml",
                  "references/graph_manifest.json",
                  "references/nodes.jsonl",
                  "references/edges.jsonl",
                  "references/chunks.jsonl",
                  "references/coverage_matrix.jsonl",
                  "references/query_qa.jsonl",
                  "scripts/validate_graph.py",
                  "scripts/query_graph.py",
                  "scripts/expand_context.py",
              ],
              "spring-modern-api": [
                  "agents/openai.yaml",
                  "references/ontology.yaml",
                  "references/graph_manifest.json",
                  "references/nodes.jsonl",
                  "references/edges.jsonl",
                  "references/chunks.jsonl",
                  "references/coverage_matrix.jsonl",
                  "references/query_qa.jsonl",
                  "scripts/validate_graph.py",
                  "scripts/query_graph.py",
                  "scripts/expand_context.py",
              ],
              "python-architecture-patterns": [
                  "agents/openai.yaml",
                  "references/ontology.yaml",
                  "references/graph_manifest.json",
                  "references/nodes.jsonl",
                  "references/edges.jsonl",
                  "references/chunks.jsonl",
                  "references/coverage_matrix.jsonl",
                  "references/query_qa.jsonl",
                  "scripts/query_knowledge.py",
              ],
              "domain-driven-design-first-steps": [
                  "agents/openai.yaml",
                  "references/ontology.yaml",
                  "references/graph_manifest.json",
                  "references/nodes.jsonl",
                  "references/edges.jsonl",
                  "references/chunks.jsonl",
                  "references/coverage_matrix.jsonl",
                  "references/query_qa.jsonl",
                  "scripts/query_graph.py",
                  "scripts/expand_context.py",
                  "scripts/lint_knowledge_pack.py",
                  "scripts/audit_public_safety.py",
              ],
              "codebase-understanding": [
                  "agents/openai.yaml",
                  "assets/dashboard/index.html",
                  "references/graph-schema.md",
                  "references/upstream-analysis.md",
                  "scripts/build_chat_prompt.py",
                  "scripts/explain_graph.py",
                  "scripts/graph_utils.py",
                  "scripts/query_graph.py",
                  "scripts/scan_codebase.py",
                  "scripts/semantic_graph.py",
                  "scripts/serve_dashboard.py",
                  "scripts/understand_codebase.py",
                  "scripts/validate_graph.py",
                  "scripts/write_diff_overlay.py",
              ],
              "big-trader-leading-stock-trading": [
                  "agents/openai.yaml",
                  "references/ontology.yaml",
                  "references/graph_manifest.json",
                  "references/nodes.jsonl",
                  "references/edges.jsonl",
                  "references/chunks.jsonl",
                  "scripts/query_knowledge.py",
                  "scripts/validate_pack.py",
              ],
              "short-term-trading-3pct": [
                  "agents/openai.yaml",
                  "references/ontology.yaml",
                  "references/graph_manifest.json",
                  "references/nodes.jsonl",
                  "references/edges.jsonl",
                  "references/chunks.jsonl",
                  "scripts/query_knowledge.py",
                  "scripts/validate_pack.py",
              ],
              "stock-short-term-trading": [
                  "agents/openai.yaml",
                  "references/ontology.yaml",
                  "references/graph_manifest.json",
                  "references/nodes.jsonl",
                  "references/edges.jsonl",
                  "references/chunks.jsonl",
                  "scripts/query_knowledge.py",
                  "scripts/validate_pack.py",
              ],
          }

          for expected_name, required in skills.items():
              skill_dir = Path("skills") / expected_name
              skill_file = skill_dir / "SKILL.md"

              if not skill_file.is_file():
                  sys.exit(f"Missing {skill_file}")

              text = skill_file.read_text(encoding="utf-8")
              if not text.startswith("---\n"):
                  sys.exit(f"{skill_file} must start with YAML frontmatter")

              try:
                  _, frontmatter, body = text.split("---", 2)
              except ValueError:
                  sys.exit(f"{skill_file} frontmatter is not closed")

              data = yaml.safe_load(frontmatter) or {}
              name = data.get("name")
              description = data.get("description")

              if name != expected_name:
                  sys.exit(f"Unexpected skill name for {skill_file}: {name!r}")
              if skill_dir.name != name:
                  sys.exit(f"{skill_dir}: directory name must match frontmatter name")
              if not description or not isinstance(description, str):
                  sys.exit(f"{skill_file} requires a string description")
              if len(description.strip()) < 80:
                  sys.exit(f"{skill_file} description is too short for reliable discovery")
              if not re.fullmatch(r"[a-z0-9]+(?:-[a-z0-9]+)*", name):
                  sys.exit(f"{skill_file} name must use lowercase letters, digits, and hyphens")
              if not body.strip():
                  sys.exit(f"{skill_file} body must not be empty")

              missing = [str(skill_dir / path) for path in required if not (skill_dir / path).is_file()]
              if missing:
                  sys.exit("Missing required bundled files: " + ", ".join(missing))

              forbidden = [
                  skill_dir / ".venv",
                  skill_dir / "output",
                  skill_dir / "outputs",
                  skill_dir / "ocr-output",
                  skill_dir / "ocr_output",
              ]
              tracked = subprocess.run(
                  ["git", "ls-files", "--", *(str(path) for path in forbidden)],
                  check=False,
                  capture_output=True,
                  text=True,
              )
              tracked_artifacts = [line for line in tracked.stdout.splitlines() if line.strip()]
              if tracked_artifacts:
                  sys.exit("Runtime artifacts must not be tracked: " + ", ".join(tracked_artifacts))

          print("Skill manifests are valid")
          PY

      - name: Compile Python helper scripts
        run: |
          python -m py_compile \
            skills/moonshotnote-ocr/scripts/doctor.py \
            skills/moonshotnote-ocr/scripts/ocr_image.py \
            skills/moonshotnote-ocr/scripts/review_low_confidence.py \
            skills/fastapi-clean-architecture/scripts/validate_graph.py \
            skills/fastapi-clean-architecture/scripts/query_graph.py \
            skills/fastapi-clean-architecture/scripts/expand_context.py \
            skills/fastapi-clean-architecture/scripts/prepare_private_source.py \
            skills/text-knowledge-skill-builder/scripts/chunk_source_text.py \
            skills/text-knowledge-skill-builder/scripts/lint_knowledge_pack.py \
            skills/text-knowledge-skill-builder/scripts/audit_public_safety.py \
            skills/tidy-first/scripts/validate_graph.py \
            skills/tidy-first/scripts/query_graph.py \
            skills/tidy-first/scripts/expand_context.py \
            skills/backend-architecture/scripts/validate_graph.py \
            skills/backend-architecture/scripts/query_graph.py \
            skills/backend-architecture/scripts/expand_context.py \
            skills/modern-java-in-action/scripts/validate_graph.py \
            skills/modern-java-in-action/scripts/query_graph.py \
            skills/modern-java-in-action/scripts/expand_context.py \
            skills/spring-modern-api/scripts/validate_graph.py \
            skills/spring-modern-api/scripts/query_graph.py \
            skills/spring-modern-api/scripts/expand_context.py \
            skills/python-architecture-patterns/scripts/query_knowledge.py \
            skills/domain-driven-design-first-steps/scripts/query_graph.py \
            skills/domain-driven-design-first-steps/scripts/expand_context.py \
            skills/domain-driven-design-first-steps/scripts/lint_knowledge_pack.py \
            skills/domain-driven-design-first-steps/scripts/audit_public_safety.py \
            skills/codebase-understanding/scripts/build_chat_prompt.py \
            skills/codebase-understanding/scripts/explain_graph.py \
            skills/codebase-understanding/scripts/graph_utils.py \
            skills/codebase-understanding/scripts/query_graph.py \
            skills/codebase-understanding/scripts/scan_codebase.py \
            skills/codebase-understanding/scripts/semantic_graph.py \
            skills/codebase-understanding/scripts/serve_dashboard.py \
            skills/codebase-understanding/scripts/understand_codebase.py \
            skills/codebase-understanding/scripts/validate_graph.py \
            skills/codebase-understanding/scripts/write_diff_overlay.py \
            skills/big-trader-leading-stock-trading/scripts/query_knowledge.py \
            skills/big-trader-leading-stock-trading/scripts/validate_pack.py \
            skills/short-term-trading-3pct/scripts/query_knowledge.py \
            skills/short-term-trading-3pct/scripts/validate_pack.py \
            skills/stock-short-term-trading/scripts/query_knowledge.py \
            skills/stock-short-term-trading/scripts/validate_pack.py \
            tools/audit_public_verbatim.py \
            tools/apply_chunk_grounded_traces.py \
            tools/extract_chunk_grounded_candidates.py \
            tools/generate_max_density_public_graph.py \
            tools/report_graph_delta.py \
            tools/run_public_graph_gates.py \
            tools/validate_coverage_matrix.py \
            tools/validate_query_qa.py \
            tools/validate_backend_meta_artifacts.py \
            tools/validate_chunk_grounding.py \
            tools/validate_edge_evidence.py \
            tools/validate_forbidden_material.py \
            tools/validate_id_stability.py \
            tools/validate_no_manifest_only_generation.py \
            tools/validate_source_ref_density.py \
            tools/validate_query_diversity.py \
            tools/validate_substitution_risk.py \
            tools/validate_transform_trace.py

      - name: Validate knowledge graphs
        run: |
          python skills/fastapi-clean-architecture/scripts/validate_graph.py \
            skills/fastapi-clean-architecture/references
          python skills/text-knowledge-skill-builder/scripts/lint_knowledge_pack.py \
            skills/fastapi-clean-architecture/references
          python skills/text-knowledge-skill-builder/scripts/audit_public_safety.py \
            skills/fastapi-clean-architecture
          python skills/tidy-first/scripts/validate_graph.py \
            skills/tidy-first/references
          python skills/text-knowledge-skill-builder/scripts/lint_knowledge_pack.py \
            skills/tidy-first/references
          python skills/text-knowledge-skill-builder/scripts/audit_public_safety.py \
            skills/tidy-first
          python skills/backend-architecture/scripts/validate_graph.py \
            skills/backend-architecture/references
          python skills/backend-architecture/scripts/build_from_source_skills.py --check
          python skills/text-knowledge-skill-builder/scripts/lint_knowledge_pack.py \
            skills/backend-architecture/references
          python skills/text-knowledge-skill-builder/scripts/audit_public_safety.py \
            skills/backend-architecture
          python skills/modern-java-in-action/scripts/validate_graph.py \
            skills/modern-java-in-action/references
          python skills/text-knowledge-skill-builder/scripts/lint_knowledge_pack.py \
            skills/modern-java-in-action/references
          python skills/text-knowledge-skill-builder/scripts/audit_public_safety.py \
            skills/modern-java-in-action
          python skills/spring-modern-api/scripts/validate_graph.py \
            skills/spring-modern-api/references
          python skills/text-knowledge-skill-builder/scripts/lint_knowledge_pack.py \
            skills/spring-modern-api/references
          python skills/text-knowledge-skill-builder/scripts/audit_public_safety.py \
            skills/spring-modern-api
          python skills/text-knowledge-skill-builder/scripts/lint_knowledge_pack.py \
            skills/python-architecture-patterns/references
          python skills/text-knowledge-skill-builder/scripts/audit_public_safety.py \
            skills/python-architecture-patterns
          python skills/text-knowledge-skill-builder/scripts/lint_knowledge_pack.py \
            skills/domain-driven-design-first-steps/references
          python skills/text-knowledge-skill-builder/scripts/audit_public_safety.py \
            skills/domain-driven-design-first-steps
          python tools/validate_coverage_matrix.py \
            --skills fastapi-clean-architecture,spring-modern-api,python-architecture-patterns,domain-driven-design-first-steps,modern-java-in-action,tidy-first
          python tools/validate_query_qa.py \
            --skills fastapi-clean-architecture,spring-modern-api,python-architecture-patterns,domain-driven-design-first-steps,modern-java-in-action,tidy-first,backend-architecture \
            --top-n 20
          python tools/validate_backend_meta_artifacts.py --repo-root .
          python tools/validate_edge_evidence.py \
            --skills fastapi-clean-architecture,spring-modern-api,python-architecture-patterns,domain-driven-design-first-steps,modern-java-in-action,tidy-first,backend-architecture
          python tools/validate_transform_trace.py \
            --skills fastapi-clean-architecture,spring-modern-api,python-architecture-patterns,domain-driven-design-first-steps,modern-java-in-action,tidy-first,backend-architecture
          python tools/validate_forbidden_material.py \
            --skills fastapi-clean-architecture,spring-modern-api,python-architecture-patterns,domain-driven-design-first-steps,modern-java-in-action,tidy-first,backend-architecture
          python tools/validate_substitution_risk.py \
            --skills fastapi-clean-architecture,spring-modern-api,python-architecture-patterns,domain-driven-design-first-steps,modern-java-in-action,tidy-first,backend-architecture
          python tools/audit_public_verbatim.py \
            --skills fastapi-clean-architecture,spring-modern-api,python-architecture-patterns,domain-driven-design-first-steps,modern-java-in-action,tidy-first,backend-architecture \
            --max-verbatim-words 25 \
            --max-char-shingle 80 \
            --fail-on-source-code-match \
            --fail-on-table-or-exercise-match
          python tools/validate_id_stability.py \
            --skills fastapi-clean-architecture,spring-modern-api,python-architecture-patterns,domain-driven-design-first-steps,modern-java-in-action,tidy-first,backend-architecture
          python tools/validate_source_ref_density.py \
            --skills fastapi-clean-architecture,spring-modern-api,python-architecture-patterns,domain-driven-design-first-steps,modern-java-in-action,tidy-first,backend-architecture
          python tools/validate_query_diversity.py \
            --skills fastapi-clean-architecture,spring-modern-api,python-architecture-patterns,domain-driven-design-first-steps,modern-java-in-action,tidy-first,backend-architecture
          python skills/text-knowledge-skill-builder/scripts/audit_public_safety.py \
            skills/codebase-understanding
          python skills/text-knowledge-skill-builder/scripts/lint_knowledge_pack.py \
            skills/big-trader-leading-stock-trading/references
          python skills/text-knowledge-skill-builder/scripts/audit_public_safety.py \
            skills/big-trader-leading-stock-trading
          python skills/big-trader-leading-stock-trading/scripts/validate_pack.py
          python skills/text-knowledge-skill-builder/scripts/lint_knowledge_pack.py \
            skills/short-term-trading-3pct/references
          python skills/text-knowledge-skill-builder/scripts/audit_public_safety.py \
            skills/short-term-trading-3pct
          python skills/short-term-trading-3pct/scripts/validate_pack.py
          python skills/text-knowledge-skill-builder/scripts/lint_knowledge_pack.py \
            skills/stock-short-term-trading/references
          python skills/text-knowledge-skill-builder/scripts/audit_public_safety.py \
            skills/stock-short-term-trading
          python skills/stock-short-term-trading/scripts/validate_pack.py

      - name: Validate codebase-understanding consumers
        run: |
          python skills/codebase-understanding/scripts/scan_codebase.py \
            . --out .codebase-understanding/codebase-map.json
          python skills/codebase-understanding/scripts/validate_graph.py \
            .codebase-understanding/codebase-map.json
          python skills/codebase-understanding/scripts/query_graph.py \
            .codebase-understanding/codebase-map.json --q "codebase understanding"
          python skills/codebase-understanding/scripts/explain_graph.py \
            .codebase-understanding/codebase-map.json README.md --root .
          python skills/codebase-understanding/scripts/build_chat_prompt.py \
            .codebase-understanding/codebase-map.json --q "How is this repository organized?"
          python skills/codebase-understanding/scripts/semantic_graph.py \
            run .codebase-understanding/codebase-map.json \
            --root . \
            --packs-dir .codebase-understanding/semantic-packs \
            --annotations-out .codebase-understanding/semantic-annotations.json \
            --out .codebase-understanding/codebase-map.json
          python skills/codebase-understanding/scripts/write_diff_overlay.py \
            .codebase-understanding/codebase-map.json \
            --changed-file README.md \
            --out .codebase-understanding/diff-overlay.json
          python skills/codebase-understanding/scripts/understand_codebase.py \
            analyze . --no-dashboard
          python skills/codebase-understanding/scripts/understand_codebase.py \
            chat . "How is this repository organized?" \
            --graph .codebase-understanding/codebase-map.json
          python skills/codebase-understanding/scripts/understand_codebase.py \
            explain . README.md \
            --graph .codebase-understanding/codebase-map.json
          python skills/codebase-understanding/scripts/understand_codebase.py \
            diff . \
            --graph .codebase-understanding/codebase-map.json \
            --changed-file README.md
          python skills/codebase-understanding/scripts/understand_codebase.py \
            onboard . \
            --graph .codebase-understanding/codebase-map.json
          python skills/codebase-understanding/scripts/understand_codebase.py \
            study . \
            --graph .codebase-understanding/codebase-map.json \
            --limit 20 \
            --source-lines 8
          python skills/codebase-understanding/scripts/understand_codebase.py \
            semantic . \
            --graph .codebase-understanding/codebase-map.json
          python skills/codebase-understanding/scripts/serve_dashboard.py \
            .codebase-understanding/codebase-map.json \
            --diff-overlay .codebase-understanding/diff-overlay.json \
            --host 127.0.0.1 \
            --port 8766 \
            --no-open > /tmp/codebase-dashboard.log 2>&1 &
          DASH_PID=$!
          trap 'kill "$DASH_PID" 2>/dev/null || true' EXIT
          sleep 2
          python - <<'PY'
          from urllib.request import urlopen

          for url in [
              "http://127.0.0.1:8766/",
              "http://127.0.0.1:8766/codebase-map.json",
              "http://127.0.0.1:8766/diff-overlay.json",
              "http://127.0.0.1:8766/source?path=README.md&start=1&end=5",
          ]:
              with urlopen(url, timeout=10) as response:
                  if response.status != 200:
                      raise SystemExit(f"{url} returned {response.status}")
          print("codebase-understanding dashboard endpoints are reachable")
          PY

      - name: Validate codebase-understanding TypeScript resolver
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys
          import tempfile
          from pathlib import Path

          root = Path(tempfile.mkdtemp(prefix="codebase-understanding-ts-"))
          (root / "src" / "app").mkdir(parents=True)
          (root / "src" / "lib").mkdir(parents=True)
          (root / "tsconfig.json").write_text(
              json.dumps(
                  {
                      "compilerOptions": {
                          "baseUrl": ".",
                          "paths": {"@lib/*": ["src/lib/*"]},
                      }
                  },
                  indent=2,
              ),
              encoding="utf-8",
          )
          (root / "src" / "lib" / "helper.ts").write_text(
              "export function helper() { return 1 }\n",
              encoding="utf-8",
          )
          (root / "src" / "app" / "main.ts").write_text(
              "import { helper } from '@lib/helper'\nexport function run() { return helper() }\n",
              encoding="utf-8",
          )
          out = root / "codebase-map.json"
          subprocess.run(
              [
                  sys.executable,
                  "skills/codebase-understanding/scripts/scan_codebase.py",
                  str(root),
                  "--out",
                  str(out),
              ],
              check=True,
          )
          subprocess.run(
              [
                  sys.executable,
                  "skills/codebase-understanding/scripts/validate_graph.py",
                  str(out),
              ],
              check=True,
          )
          graph = json.loads(out.read_text(encoding="utf-8"))
          imports = [edge for edge in graph["edges"] if edge["type"] == "imports"]
          expected = {
              "source": "file:src/app/main.ts",
              "target": "file:src/lib/helper.ts",
          }
          if not any(edge["source"] == expected["source"] and edge["target"] == expected["target"] for edge in imports):
              raise SystemExit("missing TypeScript alias import edge")
          resolver = graph["project"]["resolver"]["typescript"]
          if not resolver or resolver["pathMappings"] != 1:
              raise SystemExit("missing TypeScript resolver metadata")
          print("codebase-understanding TypeScript resolver smoke passed")
          PY

      - name: Verify skills CLI discovery
        run: |
          npx -y skills add . --list

  macos-paddle-wheel:
    name: Check macOS arm64 PaddlePaddle wheel
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify pinned PaddlePaddle macOS arm64 wheel exists
        run: |
          python -m pip install --upgrade pip
          python -m pip download \
            --dest /tmp/paddle-wheel-check \
            --only-binary=:all: \
            --platform macosx_11_0_arm64 \
            --python-version 312 \
            --implementation cp \
            --abi cp312 \
            --no-deps \
            paddlepaddle==3.2.2
